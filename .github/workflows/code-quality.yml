name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check if backend exists
      id: check-backend
      run: |
        if [ -d "backend" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Lint Backend
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: ./backend
      run: |
        npm ci
        npm run lint || echo "⚠️ No lint script found in backend"

  lint-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check if frontend exists
      id: check-frontend
      run: |
        if [ -d "frontend" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Lint Frontend
      if: steps.check-frontend.outputs.exists == 'true'
      working-directory: ./frontend
      continue-on-error: true
      run: |
        npm ci
        npm run lint || echo "⚠️ Lint completed with warnings"

  security-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if backend exists
      id: check-backend
      run: |
        if [ -d "backend" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Security Audit Backend
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: ./backend
      run: |
        npm ci
        npm audit --audit-level=moderate || true

  security-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if frontend exists
      id: check-frontend
      run: |
        if [ -d "frontend" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Security Audit Frontend
      if: steps.check-frontend.outputs.exists == 'true'
      working-directory: ./frontend
      run: |
        npm ci
        npm audit --audit-level=moderate || true
